fileVersion: 1
id: "678"
isDisabled: false
metadata:
  defaultStorageLocation: null
  error: null
  nodeMetadataSpec: |
    capitalized: External Sync
    short: ES
    plural: Stages
    tagColor: '#96DABE'

    deployStrategy: advanced
    isColumnResyncEnabled: true

    config:
    - groupName: Options
      items:

      - type: toggleButton
        attributeName: deployExecute
        displayName: Deploy Execute
        defaulf: false

      - type: toggleButton
        attributeName: runExecute
        displayName: Run Execute
        defaulf: false
      
      - type: materializationSelector
        default: table
        options:
        - table
        - view
        - transient table
        isRequired: true

      - type: overrideSQLToggle
        enableIf: "{% if node.materializationType == 'view' and config.deployExecute == true %} true {% else %} false {% endif %}"
        
      - type: toggleButton
        attributeName: clusterKey
        displayName: Cluster Key
        default: false
        isRequired: false
        enableIf: "{% if config.deployExecute == true and (node.materializationType == 'table' or node.materializationType == 'transient table') %} true {% else %} false {% endif %}"

      - type: toggleButton
        attributeName: clusterKeyExpressions
        displayName: Allow Expressions in Cluster Key
        default: false
        isRequired: false
        enableIf: "{% if (config.clusterKey and config.deployExecute == true) and ( not node.materialization == 'view') %} true {% else %} false {% endif %}"

      - type: tabular
        displayName: 'Cluster Key'
        attributeName: clusterKeyConfig
        columns:

        -  type: columnDropdownSelector
           displayName: Column Name
           attributeName: columnName
           isRequired: false
      
        isRequired: false
        enableIf: "{% if (config.clusterKey and not config.clusterKeyExpressions) and config.deployExecute == true %} true {% else %} false {% endif %}"

      - type: tabular
        displayName: 'Cluster Key'
        attributeName: clusterKeyConfigExpressions
        columns:

        -  type: columnDropdownSelector
           displayName: Column Name
           attributeName: columnNameExpressions
           isRequired: false
      
        -  type: textBox
           displayName: Expression
           attributeName: sqlExpression
           default: "ex. trunc(<column_name>, -5)"
           isRequired: false
      
        isRequired: false
        enableIf: "{% if (config.clusterKey and config.clusterKeyExpressions) and config.deployExecute == true %} true {% else %} false {% endif %}"

      - type: multisourceToggle
        enableIf: "{% if (config.runExecute == true or (node.materializationType == 'view' and config.deployExecute == true)) and (not node.override.create.enabled) %} true {% else %} false {% endif %}" 
        
      - displayName: Multi Source Strategy
        attributeName: insertStrategy
        type: dropdownSelector
        default: INSERT
        options:
        - "INSERT"
        - "UNION"
        - "UNION ALL"
        isRequired: false
        enableIf: "{% if node.isMultisource and (config.runExecute == true or (node.materializationType == 'view' and config.deployExecute == true)) %} true {% else %} false {% endif %}"

      - displayName: Truncate Before
        attributeName: truncateBefore
        type: toggleButton
        default: true
        enableIf: "{% if config.runExecute == true and (not node.materializationType == 'view') %} true {% else %} false {% endif %}"

      - displayName: Enable Tests
        attributeName: testsEnabled
        type: toggleButton
        default: false


      - displayName: Distinct
        attributeName: selectDistinct
        type: toggleButton
        default: false
        enableIf: "{% if (config.runExecute == true or (node.materializationType == 'view' and config.deployExecute == true)) and not (config.groupByAll or node.override.create.enabled) %} true {% else %} false {% endif %}"

      - displayName: Group By All
        attributeName: groupByAll
        type: toggleButton
        default: false
        enableIf: "{% if (config.runExecute == true or (node.materializationType == 'view' and config.deployExecute == true)) and not (config.selectDistinct or node.override.create.enabled) %} true {% else %} false {% endif %}"

      - displayName: Order By
        attributeName: orderby
        type: toggleButton
        default: false
        enableIf: "{% if config.runExecute == true and node.materializationType != 'view' %} true {% else %} false {% endif %}"

      - type: tabular
        displayName: 'Sort column'
        attributeName: orderbycolumn
        columns:

          -  type: columnDropdownSelector
             displayName: Column Name
             attributeName: sortColName

          -  type: dropdownSelector
             displayName: Sort Order
             attributeName: sortOrder
             default: desc
             options:
             - desc
             - asc
           
        isRequired: true
        enableIf: "{% if config.runExecute == true and (config.orderby and node.materializationType != 'view') %} true {% else %} false {% endif %}"

      - displayName: ASOF Join
        attributeName: asofJoinMain
        type: toggleButton
        default: false
        enableIf: "{% if config.deployExecute == true and (node.materializationType == 'view' or node.materializationType == 'table' or node.materializationType == 'transient table') %} true {% else %} false {% endif %}"


      - displayName: Pre-SQL
        attributeName: preSQL
        type: textBox
        syntax: sql
        default: ""
        isRequired: false
        enableIf: "{% if config.runExecute == true and not (node.materializationType == 'view' or node.override.create.enabled) %} true {% else %} false {% endif %}"

      - displayName: Post-SQL
        attributeName: postSQL
        type: textBox
        syntax: sql
        default: ""
        isRequired: false
        enableIf: "{% if config.runExecute == true and not (node.materializationType == 'view' or node.override.create.enabled) %} true {% else %} false {% endif %}"

    - groupName: ASOF Join Options

      items:
      - displayName: Match Condition
        attributeName: asofJoin
        type: toggleButton
        default: true
        enableIf: "{%- if node.materializationType == 'view' -%} false {%- else %} true {%- endif -%}"
        
      - type: toggleButton
        displayName: On
        attributeName: asofJoinON
        isRequired: false
        default: false
        enableIf: "{%- if config.asofJoin and not config.asofJoinUSING -%} true {%- else -%} false {%- endif -%}"

      - type: toggleButton
        displayName: Using
        attributeName: asofJoinUSING
        isRequired: false
        default: false
        enableIf: "{%- if config.asofJoin and not config.asofJoinON -%} true {%- else -%} false {%- endif -%}"

      - type: tabular
        displayName: 'ASOF column'
        attributeName: asofColumn
        isRequired: false
        enableIf: "{%- if (config.asofJoin) -%} true {%- else -%} false {%- endif -%}"
        columns:

        - displayName: 'Right Table Storage Location'
          attributeName: rightTableSL
          type: textBox
          isRequired: false 
    	  
        - displayName: Right Table Name
          attributeName: rightTable
          type: textBox
          isRequired: false 
    	  
        - displayName: |
            Match Condition 
            (e.g TableName.ColumnName >= TableName.ColumnName)
          attributeName: matchCondition 
          type: textBox
          isRequired: false 

        -  type: textBox
           displayName:  |
            ON Condition 
            (e.g TableName.ColumnName = TableName.ColumnName)
           attributeName: onCondition
           isRequired: false
           enableIf: "{%- if (config.asofJoin and config.asofJoinON) -%} true {%- else -%} false {%- endif -%}"

        -  type: textBox
           displayName: Using Column Name
           attributeName: usingColumnName
           isRequired: false
           enableIf: "{%- if (config.asofJoin and config.asofJoinUSING) -%} true {%- else -%} false {%- endif -%}"
      enableIf: "{%- if config.asofJoinMain -%} true {%- else -%} false {%- endif -%}"

    joinTemplate: |
     {%- if config.asofJoinMain and config.asofJoin -%} 
     {%- set tabRSL,tabR,mCond = config.asofColumn.get('items') | map(attribute='rightTableSL') | list,config.asofColumn.get('items') | map(attribute='rightTable') | list,config.asofColumn.get('items') | map(attribute='matchCondition') | list -%}
     {%- if config.asofJoinON -%} 
     {%- set onCond = config.asofColumn.get('items') | map(attribute='onCondition') | list -%}
     {%- endif -%} 
     {%- if config.asofJoinUSING -%} 
     {%- set col_USING = config.asofColumn.get('items') | map(attribute='usingColumnName') | list -%}
     {%- endif -%} 
      {%- set src = namespace() -%}
      {%- for dep in sources[0].dependencies -%}
        {%- if loop.index == 1 %}
        FROM  {{ ref_raw(dep.node.location.name, dep.node.name) }} "{{ dep.node.name }}"
        {%- endif -%}
        {%- set src.name = dep.node.name -%}
      {%- endfor -%}
        {%- for mc in mCond %}
        ASOF JOIN {{ ref_raw(tabRSL[loop.index0],tabR[loop.index0])}} "{{tabR[loop.index0]}}"
        MATCH_CONDITION ({{mc}} )
        {%- if config.asofJoinON and onCond[loop.index0] !=None %} 
        ON  ({{onCond[loop.index0]}} )
        {%- elif config.asofJoinUSING and col_USING[loop.index0] !=None %} 
        USING ({{col_USING[loop.index0]}})
        {%- endif -%}
        {%- endfor -%}
     {%- else -%}
      {%- for dep in sources[0].dependencies -%}
      {%- if loop.first %} 
       FROM  {{ ref_raw(dep.node.location.name, dep.node.name) }} {{ dep.node.name }}
      {%- else %}
       LEFT JOIN  {{ ref_raw(dep.node.location.name, dep.node.name) }} {{ dep.node.name }}
      {%- endif -%}
      {%- if not loop.first %} 
       ON {{ sources[0].dependencies[loop.index0].node.name }}./*COLUMN*/ = {{ sources[0].dependencies[loop.index0 - 1].node.name }}./*COLUMN*/ 
      {% endif -%}
      {% endfor -%}
     {%- endif -%} 
name: External Sync
type: NodeType
