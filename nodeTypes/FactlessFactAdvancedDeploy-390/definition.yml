fileVersion: 1
id: "390"
isDisabled: false
metadata:
  defaultStorageLocation: null
  error: null
  nodeMetadataSpec: |-
    capitalized: Factless Fact Advanced Deploy
    plural: Facts
    short: FCT
    tagColor: '#D9A438'

    deployStrategy: advanced

    config:
    - groupName: Options
      items:
      - type: materializationSelector
        isRequired: true
        default: table
        options:
        - table
        - transient table

      - type: multisourceToggle
        enableIf: "{% if node.override.create.enabled %} false {% else %} true {% endif %}"

      - displayName: Multi Source Strategy
        attributeName: insertStrategy
        type: dropdownSelector
        default: UNION ALL
        options:
        - "UNION"
        - "UNION ALL"
        isRequired: false
        enableIf: "{% if node.isMultisource %} true {% else %} false {% endif %}"

      - type: toggleButton
        attributeName: lastModifiedComparison
        displayName: Last Modified Based Incremental Load
        default: false

      - type: label
        attributeName: l1
        displayName: ℹ️ Choose timestamp or incremental id column
        enableIf: "{% if config.lastModifiedComparison %} true {% else %} false {% endif %}"
      
      - type: columnDropdownSelector
        attributeName: lastModifiedColumn
        displayName: Last Modified Column
        enableIf: "{%if config.lastModifiedComparison %} true {% else %} false {% endif %}"

      - type: textBox
        displayName: Lookback Days
        attributeName: lookbackdays
        default : 0
        enableIf: "{% if (config.lastModifiedComparison and 'TIMESTAMP' in (config.lastModifiedColumn.dataType | upper)) %} true {% else %} false {% endif %}"

      - type: toggleButton
        attributeName: softDeleteStrategy 
        displayName: Enable Delete Handling
        default: false

      - type: label
        attributeName: l_delete
        displayName: ⚠️ Source deleted records (hard or soft delete) will be hard deleted from target.
        enableIf: "{% if config.mergeDeleteStrategy in ['SOFT DELETED', 'HARD DELETED']
                    and config.softDeleteStrategy %} true {% else %} false {% endif %}"
      
      - displayName: Source Delete Strategy
        attributeName: mergeDeleteStrategy
        type: dropdownSelector
        default: "NO DELETES"
        options:
        - "NO DELETES"
        - "HARD DELETED"
        - "SOFT DELETED"
        isRequired: false
        enableIf: "{% if config.softDeleteStrategy 
                  and not(node.isMultisource) %} true {% else %} false {% endif %}"
      
      - type: columnDropdownSelector
        attributeName: softdelcolumn
        displayName: Source Deleted Record Indicator
        enableIf: "{% if config.softDeleteStrategy
                    and (
                        node.isMultisource
                        or config.mergeDeleteStrategy == 'SOFT DELETED'
                    )
                    %} true {% else %} false {% endif %}"

      - type: toggleButton
        attributeName: clusterKey
        displayName: Cluster Key
        default: false
        isRequired: false
        enableIf: "{% if node.materializationType == 'table' or node.materializationType == 'transient table'  %} true {% else %} false {% endif %}"

      - type: toggleButton
        attributeName: clusterKeyExpressions
        displayName: Allow Expressions in Cluster Key
        default: false
        isRequired: false
        enableIf: "{% if config.clusterKey %} true {% else %} false {% endif %}"

      - type: tabular
        displayName: 'Cluster Key'
        attributeName: clusterKeyConfig
        columns:

        -  type: columnDropdownSelector
           displayName: Column Name
           attributeName: columnName
           isRequired: false
      
        isRequired: false
        enableIf: "{% if (config.clusterKey and not config.clusterKeyExpressions) %} true {% else %} false {% endif %}"

      - type: tabular
        displayName: 'Cluster Key'
        attributeName: clusterKeyConfigExpressions
        columns:

        -  type: columnDropdownSelector
           displayName: Column Name
           attributeName: columnNameExpressions
           isRequired: false
      
        -  type: textBox
           displayName: Expression(Column name to be enclosed within double quotes)
           attributeName: sqlExpression
           default: "ex. trunc(\"<column_name>\", -5)"
           isRequired: false
      
        isRequired: false
        enableIf: "{% if (config.clusterKey and config.clusterKeyExpressions) %} true {% else %} false {% endif %}"



      - displayName: Truncate Before
        attributeName: truncateBefore
        type: toggleButton
        default: false

      - displayName: Enable Tests
        attributeName: testsEnabled
        type: toggleButton
        default: false
        
      - displayName: Distinct
        attributeName: selectDistinct
        type: toggleButton
        default: false
        enableIf: "{% if config.groupByAll or  node.override.create.enabled %} %} false {% else %} true {% endif %}"

      - displayName: Group By All
        attributeName: groupByAll
        type: toggleButton
        default: false
        enableIf: "{% if config.selectDistinct or  node.override.create.enabled %} %} false {% else %} true {% endif %}"   

      - displayName: Order By
        attributeName: orderby
        type: toggleButton
        default: false

      - type: tabular
        displayName: 'Sort column'
        attributeName: orderbycolumn
        columns:

          -  type: columnDropdownSelector
             displayName: Column Name
             attributeName: sortColName

          -  type: dropdownSelector
             displayName: Sort Order
             attributeName: sortOrder
             default: desc
             options:
             - desc
             - asc
           
        isRequired: true
        enableIf: "{% if config.orderby %} true {% else %} false {% endif %}"

      - displayName: Pre-SQL
        attributeName: preSQL
        type: textBox
        syntax: sql
        isRequired: false

      - displayName: Post-SQL
        attributeName: postSQL
        type: textBox
        syntax: sql
        isRequired: false

    systemColumns:
    - displayName: SYSTEM_CREATE_DATE
      transform: CAST(CURRENT_TIMESTAMP AS TIMESTAMP)
      dataType: TIMESTAMP
      placement: end
      attributeName: isSystemCreateDate

    - displayName: SYSTEM_UPDATE_DATE
      transform: CAST(CURRENT_TIMESTAMP AS TIMESTAMP)
      dataType: TIMESTAMP
      placement: end
      attributeName: isSystemUpdateDate
name: Factless Fact  Advanced Deploy
type: NodeType
